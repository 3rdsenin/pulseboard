server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend so the browser never makes cross-origin requests
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: unknown paths serve index.html so React Router takes over
    location / {
        try_files $uri $uri/ /index.html;
    }
}
